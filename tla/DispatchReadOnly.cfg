\* Model check with an empty ceiling — read-only binary.
\* Verifies that NO action can ever execute.

SPECIFICATION Spec

CONSTANTS
    Domains = {d1, d2}
    Handlers = {h1, h2}
    AllowedHandlers = {h1, h2}
    MutationPaths = {p1, p2}
    CeilingPaths = {}
    OutputModes = {json}

INVARIANTS
    CeilingEnforced
    InvalidDomainNeverExecutes
    UnmatchedNeverExecutes
    DisallowedNeverExecutes
    ExitCodeConsistent
    ValidExitCodes
    DryRunCannotBypassCeiling
    CeilingMonotonic

PROPERTIES
    EventuallyTerminates
