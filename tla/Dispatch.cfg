SPECIFICATION Spec

CONSTANTS
    Domains = {d1, d2}
    Handlers = {h1, h2, h3}
    AllowedHandlers = {h1, h2, h3}
    MutationPaths = {p1, p2, p3}
    CeilingPaths = {p1, p2}
